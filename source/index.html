<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BalatJack</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div id="game-container">
      <div id="game-board">
        <div id="dealer-area">
          <div id="dealer-hand" class="hand"></div>
          <div id="dealer-score" class="score">0</div>
        </div>
        <div id="player-area">
          <div id="player-hand" class="hand"></div>
          <div id="player-score" class="score">0</div>
          <div id="player-controls">
            <button id="hit-button">Hit</button>
            <button id="stand-button">Stand</button>
            <button id="double-button">Double</button>
            <button id="split-button">Split</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="scripts/frontend/app.js"></script>
  </body>
</html>
